<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- 배경 -->
  <rect width="512" height="512" rx="112" fill="#080C12"/>

  <!-- 선로 라인 (오렌지→파랑 그라디언트) -->
  <defs>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FF7A00"/>
      <stop offset="100%" style="stop-color:#3B82F6"/>
    </linearGradient>
    <linearGradient id="trainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF9A40"/>
      <stop offset="100%" style="stop-color:#FF7A00"/>
    </linearGradient>
  </defs>

  <!-- 선로 -->
  <rect x="64" y="310" width="384" height="14" rx="7" fill="url(#lineGrad)"/>

  <!-- 열차 본체 -->
  <rect x="100" y="190" width="312" height="108" rx="20" fill="url(#trainGrad)"/>

  <!-- 열차 앞면 강조 -->
  <rect x="360" y="190" width="52" height="108" rx="20" fill="#E86E00"/>

  <!-- 창문들 -->
  <rect x="118" y="212" width="52" height="42" rx="8" fill="#0D1829" opacity="0.85"/>
  <rect x="184" y="212" width="52" height="42" rx="8" fill="#0D1829" opacity="0.85"/>
  <rect x="250" y="212" width="52" height="42" rx="8" fill="#0D1829" opacity="0.85"/>
  <rect x="316" y="212" width="36" height="42" rx="8" fill="#0D1829" opacity="0.85"/>

  <!-- 헤드라이트 -->
  <circle cx="390" cy="270" r="10" fill="#FBBF24"/>
  <circle cx="390" cy="270" r="6" fill="#FFF"/>

  <!-- 바퀴 -->
  <circle cx="155" cy="320" r="22" fill="#1E2A3A" stroke="#FF7A00" stroke-width="5"/>
  <circle cx="155" cy="320" r="8" fill="#FF7A00"/>
  <circle cx="260" cy="320" r="22" fill="#1E2A3A" stroke="#FF7A00" stroke-width="5"/>
  <circle cx="260" cy="320" r="8" fill="#FF7A00"/>
  <circle cx="365" cy="320" r="22" fill="#1E2A3A" stroke="#3B82F6" stroke-width="5"/>
  <circle cx="365" cy="320" r="8" fill="#3B82F6"/>

  <!-- 대경선 텍스트 -->
  <text x="256" y="410" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif"
    font-size="62" font-weight="900" fill="#FFFFFF"
    text-anchor="middle" letter-spacing="-1">대경선</text>

  <!-- 상단 노선 표시 작은 점들 -->
  <circle cx="160" cy="158" r="7" fill="#FF7A00"/>
  <line x1="173" y1="158" x2="197" y2="158" stroke="#556" stroke-width="3" stroke-dasharray="4,3"/>
  <circle cx="210" cy="158" r="5" fill="#667"/>
  <line x1="221" y1="158" x2="245" y2="158" stroke="#556" stroke-width="3" stroke-dasharray="4,3"/>
  <circle cx="258" cy="158" r="5" fill="#667"/>
  <line x1="269" y1="158" x2="293" y2="158" stroke="#556" stroke-width="3" stroke-dasharray="4,3"/>
  <circle cx="306" cy="158" r="5" fill="#667"/>
  <line x1="317" y1="158" x2="341" y2="158" stroke="#556" stroke-width="3" stroke-dasharray="4,3"/>
  <circle cx="354" cy="158" r="7" fill="#3B82F6"/>
</svg>
